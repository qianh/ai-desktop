<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>枢境</title>
    <script>
      (function(){
        /* Keep in sync with STYLE_PRESET_IDS in src/lib/appearance.ts */
        var styles = ['classic','minimal','editorial','obsidian','glass'];
        var s = localStorage.getItem('appscope-style') || 'classic';
        if (styles.indexOf(s) === -1) s = 'classic';
        var themes = ['light','dark','system'];
        var t = localStorage.getItem('theme') || 'system';
        if (themes.indexOf(t) === -1) t = 'system';
        var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-style', s);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        if (s === 'glass') {
          var g = localStorage.getItem('appscope-glass') || 'soft';
          if (['solid','soft','liquid'].indexOf(g) === -1) g = 'soft';
          document.documentElement.setAttribute('data-glass', g);
        }
        var ua = navigator.userAgent.toLowerCase();
        var plat = ua.indexOf('mac') >= 0 ? 'macos' : ua.indexOf('win') >= 0 ? 'windows' : ua.indexOf('linux') >= 0 ? 'linux' : 'unknown';
        document.documentElement.setAttribute('data-platform', plat);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
